<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario – Docentes en el Exterior</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8; --card: #fff; --primary: #2563eb; --primary-dk: #1d4ed8;
    --ok: #16a34a; --ko: #dc2626; --neutral: #6b7280;
    --border: #e5e7eb; --text: #111827; --sub: #6b7280;
    --shadow: 0 4px 24px rgba(0,0,0,.08); --r: 14px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
  #app { max-width: 800px; margin: 0 auto; }

  /* WELCOME */
  #welcome { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 44px 36px; text-align: center; }
  #welcome h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: var(--primary); }
  #welcome p { color: var(--sub); margin-bottom: 32px; font-size: 16px; line-height: 1.5; }
  
  .btn-go { 
    background: var(--primary); color: #fff; border: 0; padding: 14px 32px; 
    font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; 
    width: 100%; font-weight: 600; display: block; margin-bottom: 10px;
  }
  .btn-go:hover { background: var(--primary-dk); transform: translateY(-1px); }
  .btn-review { background: #6b7280; display: none; }

  /* QUIZ */
  #quiz { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 36px; display: none; }
  .prog { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
  .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
  .q-num { font-size: 13px; color: var(--primary); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
  .q-text { font-size: 19px; font-weight: 600; margin-bottom: 24px; line-height: 1.4; color: #1f2937; }
  .opt { border: 2px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px; transition: 0.2s; }
  .opt:hover:not(.disabled) { border-color: var(--primary); background: #f8faff; }
  .opt.correct { border-color: var(--ok); background: #f0fdf4; }
  .opt.wrong { border-color: var(--ko); background: #fef2f2; }
  .opt.hl { border-color: var(--ok); background: #f0fdf4; }
  .opt.disabled { pointer-events: none; }
  .lt { width: 28px; height: 28px; background: #f3f4f6; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }

  .fb { margin-top: 20px; padding: 16px; border-radius: 10px; display: none; font-size: 15px; line-height: 1.5; }
  .fb.show { display: block; }
  .fb.ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .fb.ko { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }

  /* RESULTS */
  #results { background: var(--card); border-radius: var(--r); box-shadow: var(--shadow); padding: 44px 36px; text-align: center; display: none; }
  .grade-bar { height: 12px; background: #eee; border-radius: 6px; margin: 24px 0; overflow: hidden; }
  .grade-fill { height: 100%; width: 0%; transition: 1s; }
</style>
</head>
<body>

<div id="app">
  <div id="welcome">
    <h1>📚 Cuestionario Docentes</h1>
    <p>Legislación Educativa · Personal Docente en el Exterior<br>Banco de <strong>871</strong> preguntas · 50 por examen</p>
    <button class="btn-go" onclick="startQuiz()">🚀 Comenzar examen</button>
    <button id="btn-review" class="btn-go btn-review" onclick="startReview()">📝 Repasar mis fallos (0)</button>
  </div>

  <div id="quiz">
    <div class="prog"><div id="prog-fill" class="prog-fill"></div></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:24px; font-size:14px; color:var(--sub);">
      <span id="prog-txt"></span>
      <span id="prog-pct">0%</span>
    </div>
    <div id="q-num" class="q-num"></div>
    <div id="q-text" class="q-text"></div>
    <div id="options"></div>
    <div id="fb" class="fb"></div>
    
    <div style="margin-top:32px; display:flex; gap:12px;">
      <button id="btn-skip" class="btn-go" style="background:#f3f4f6; color:#4b5563; flex:1;" onclick="skip()">Saltar</button>
      <button id="btn-next" class="btn-go" style="flex:2; display:none;" onclick="next()">Siguiente</button>
    </div>
  </div>

  <div id="results">
    <h2>🏁 Resultado Final</h2>
    <div class="grade-bar"><div id="grade-fill" class="grade-fill"></div></div>
    <div style="font-size:48px; font-weight:800;" id="res-score">0,00</div>
    <p style="margin-bottom:20px; color:var(--sub)">puntos sobre 50</p>
    <button class="btn-go" onclick="restartQuiz()">Volver al Inicio</button>
  </div>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  databaseURL: "https://centro-de-estudio-d77fb-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isReviewMode = false;
let failedQuestions = [];
let currentQuestions = [];
let ok=0, ko=0, sk=0, idx=0, TOTAL=50;

// BANCO DE PREGUNTAS (871)
const BANK =;

// LÓGICA DE CARGA DE FALLOS SINCRONIZADOS
window.onload = () => {
  db.ref('fallos').on('value', (snapshot) => {
    const data = snapshot.val();
    failedQuestions = data ? Object.values(data) : [];
    const btn = document.getElementById('btn-review');
    btn.style.display = failedQuestions.length > 0 ? 'block' : 'none';
    btn.textContent = `📝 Repasar mis fallos (${failedQuestions.length})`;
  });
};

function startQuiz() {
  isReviewMode = false;
  const shuffled = [...BANK].sort(() => 0.5 - Math.random());
  currentQuestions = shuffled.slice(0, 50);
  initQuiz();
}

function startReview() {
  isReviewMode = true;
  currentQuestions = [...failedQuestions].sort(() => 0.5 - Math.random());
  initQuiz();
}

function initQuiz() {
  ok=0; ko=0; sk=0; idx=0;
  TOTAL = currentQuestions.length;
  document.getElementById('welcome').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('quiz').style.display='block';
  renderQ();
}

function renderQ() {
  const q = currentQuestions[idx];
  document.getElementById('prog-txt').textContent = `Pregunta ${idx + 1} de ${TOTAL}`;
  document.getElementById('prog-pct').textContent = Math.round((idx / TOTAL) * 100) + '%';
  document.getElementById('prog-fill').style.width = (idx / TOTAL) * 100 + '%';
  document.getElementById('q-num').textContent = `Pregunta ${q.n || (idx+1)}`;
  document.getElementById('q-text').textContent = q.q;

  const optsDiv = document.getElementById('options');
  optsDiv.innerHTML = '';
  document.getElementById('fb').className = 'fb';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').disabled = false;

  Object.entries(q.opts).forEach(([letter, text]) => {
    const div = document.createElement('div');
    div.className = 'opt';
    div.innerHTML = `<div class="lt">${letter}</div><div>${text}</div>`;
    div.onclick = () => select(letter, div);
    optsDiv.appendChild(div);
  });
}

function select(letter, el) {
  const q = currentQuestions[idx];
  const all = document.querySelectorAll('.opt');
  all.forEach(o => o.classList.add('disabled'));
  document.getElementById('btn-skip').disabled = true;

  // ID único para Firebase basado en el número de pregunta o texto
  const qID = "q_" + (q.n || q.q.replace(/[^a-zA-Z0-9]/g, "").substring(0,30));

  if (letter === q.correct) {
    el.classList.add('correct');
    ok++;
    showFeedback(true, q.just);
    // Si acertamos en modo repaso, se elimina de la lista de fallos
    if (isReviewMode) db.ref('fallos/' + qID).remove();
  } else {
    el.classList.add('wrong');
    ko++;
    // Si fallamos, se guarda en Firebase
    db.ref('fallos/' + qID).set(q);
    all.forEach(o => {
      if (o.textContent.startsWith(q.correct)) o.classList.add('hl');
    });
    showFeedback(false, q.just);
  }
  document.getElementById('btn-next').style.display = 'block';
}

function showFeedback(isOk, text) {
  const f = document.getElementById('fb');
  f.textContent = text || (isOk ? "¡Correcto!" : "Incorrecto");
  f.className = 'fb show ' + (isOk ? 'ok' : 'ko');
}

function skip() { sk++; next(); }

function next() {
  idx++;
  if (idx >= TOTAL) { showResults(); return; }
  renderQ();
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const r = document.getElementById('results');
  r.style.display = 'block';
  const score = ok - (ko * 0.20);
  document.getElementById('res-score').textContent = score.toFixed(2).replace('.', ',');
  const pct = Math.min(100, Math.max(0, (score / TOTAL) * 100));
  const fill = document.getElementById('grade-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct >= 50 ? '#16a34a' : '#dc2626';
}

function restartQuiz() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('welcome').style.display = 'block';
}
</script>
</body>
</html>
